// 새 이미지가 선택되었을 때 미리보기 표시 (업로드는 아직 안 함)
let PENDING_IMAGE_FILE = null;

function handleProductImageSelect(input) {
  const file = input.files && input.files[0];
  if (!file) return;

  // 파일 크기 체크 (5MB)
  if (file.size > 5 * 1024 * 1024) {
    alert('파일 크기가 너무 큽니다. 5MB 이하 이미지를 선택해주세요.');
    input.value = '';
    return;
  }

  // 파일 타입 체크
  if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
    alert('JPG, PNG, WEBP 파일만 업로드 가능합니다.');
    input.value = '';
    return;
  }

  PENDING_IMAGE_FILE = file;

  // 미리보기 (브라우저에서만, 아직 업로드 안 함)
  const reader = new FileReader();
  reader.onload = (e) => {
    const preview = $('pf_image_preview');
    const previewImg = $('pf_image_preview_img');
    if (preview && previewImg) {
      previewImg.src = e.target.result;
      previewImg.style.display = 'block';
      preview.style.display = 'block';
    }
    const status = $('pf_image_status');
    if (status) {
      const sizeKb = (file.size / 1024).toFixed(0);
      status.textContent = `${file.name} (${sizeKb}KB) · 저장 시 업로드됩니다`;
      status.style.color = 'var(--green)';
    }
  };
  reader.readAsDataURL(file);
}

function removeProductImage() {
  if (!confirm('이미지를 제거하시겠습니까?')) return;
  PENDING_IMAGE_FILE = null;
  $('pf_image_url').value = '';
  const preview = $('pf_image_preview');
  if (preview) preview.style.display = 'none';
  const fileInput = $('pf_image_file');
  if (fileInput) fileInput.value = '';
  const status = $('pf_image_status');
  if (status) {
    status.textContent = '이미지 제거됨 (저장 시 반영)';
    status.style.color = 'var(--ink-soft)';
  }
}

// 이미지가 선택되어 있으면 Supabase Storage에 업로드하고 public URL 반환
async function uploadPendingImage(productCode) {
  if (!PENDING_IMAGE_FILE) {
    return $('pf_image_url').value.trim() || null; // 변경 없으면 기존 URL 그대로
  }

  const file = PENDING_IMAGE_FILE;
  const ext = file.name.split('.').pop().toLowerCase();
  const filename = `${productCode}_${Date.now()}.${ext}`;

  const { error: upErr } = await sb.storage
    .from('product-images')
    .upload(filename, file, {
      cacheControl: '3600',
      upsert: false,
      contentType: file.type
    });

  if (upErr) {
    console.error('Upload error:', upErr);
    throw new Error('이미지 업로드 실패: ' + (upErr.message || ''));
  }

  const { data: urlData } = sb.storage
    .from('product-images')
    .getPublicUrl(filename);

  return urlData.publicUrl;
}

function readProductForm() {
  return {
    code: $('pf_code').value.trim(),
    category: $('pf_category').value.trim(),
    name: $('pf_name').value.trim(),
    weight: $('pf_weight').value.trim(),
    spec: $('pf_spec').value.trim() || null,
    box_unit_count: parseInt($('pf_boxcount').value) || 10,
    base_price: parseInt($('pf_price').value) || 0,
    image_url: $('pf_image_url').value.trim() || null
  };
}

function validateProductForm(data) {
  if (!data.code || !data.category || !data.name || !data.weight || !data.base_price) {
    alert('필수 항목(*)을 모두 입력해주세요.');
    return false;
  }
  if (data.base_price <= 0) {
    alert('기본 단가는 0보다 커야 합니다.');
    return false;
  }
  return true;
}

async function createProduct() {
  const data = readProductForm();
  if (!validateProductForm(data)) return;

  const submitBtn = document.querySelector('#productFormModal .btn-primary');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '저장 중...'; }

  try {
    if (PENDING_IMAGE_FILE) {
      const url = await uploadPendingImage(data.code);
      data.image_url = url;
    }
    const { error } = await sb.from('products').insert({ ...data, active: true });
    if (error) {
      console.error(error);
      alert('등록 실패: ' + (error.message || ''));
      return;
    }
    PENDING_IMAGE_FILE = null;
    closeProductForm();
    showToast(`'${data.name}' 등록 완료`);
    loadAdminProducts();
  } catch (e) {
    console.error(e);
    alert(e.message || '등록 실패');
  } finally {
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '등록'; }
  }
}

async function updateProduct(productId) {
  const data = readProductForm();
  if (!validateProductForm(data)) return;
  const code = data.code;
  delete data.code;

  const submitBtn = document.querySelector('#productFormModal .btn-primary');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '저장 중...'; }

  try {
    if (PENDING_IMAGE_FILE) {
      const url = await uploadPendingImage(code);
      data.image_url = url;
    }
    const { error } = await sb.from('products').update(data).eq('id', productId);
    if (error) {
      console.error(error);
      alert('수정 실패: ' + (error.message || ''));
      return;
    }
    PENDING_IMAGE_FILE = null;
    closeProductForm();
    showToast(`'${data.name}' 수정 완료`);
    loadAdminProducts();
  } catch (e) {
    console.error(e);
    alert(e.message || '수정 실패');
  } finally {
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '수정'; }
  }
}

async function toggleProductActive(productId, currentActive) {
  const newActive = !currentActive;
  const action = newActive ? '판매 재개' : '판매 중지';
  if (!confirm(`이 품목을 ${action}하시겠습니까?\n${!newActive ? '\n중지 시 거래처 발주 화면에서 사라집니다 (기존 발주 이력은 그대로 보존)' : ''}`)) return;

  try {
    const { error } = await sb.from('products').update({ active: newActive }).eq('id', productId);
    if (error) {
      console.error(error);
      alert('상태 변경 실패');
      return;
    }
    showToast(action + ' 완료');
    loadAdminProducts();
  } catch (e) {
    console.error(e);
    alert('상태 변경 실패');
  }
}

async function loadAdminReports() {
  const container = $('reportsContent');
  if (!container) return;
  try {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
    const prevMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString();

    const { data: vendors } = await sb
      .from('vendors')
      .select('id, name, region, active');

    const { data: thisMonthOrders } = await sb
      .from('orders')
      .select('vendor_id, total_amount, payment_status')
      .eq('cancelled', false)
      .gte('created_at', monthStart);

    const { data: prevMonthOrders } = await sb
      .from('orders')
      .select('vendor_id, total_amount')
      .eq('cancelled', false)
      .gte('created_at', prevMonthStart)
      .lt('created_at', monthStart);

    const vList = vendors || [];
    const thisMonth = thisMonthOrders || [];
    const prevMonth = prevMonthOrders || [];

    const thisByVendor = {};
    for (const o of thisMonth) {
      if (!thisByVendor[o.vendor_id]) thisByVendor[o.vendor_id] = { amount: 0, count: 0 };
      thisByVendor[o.vendor_id].amount += (o.total_amount || 0);
      thisByVendor[o.vendor_id].count += 1;
    }
    const prevByVendor = {};
    for (const o of prevMonth) {
      if (!prevByVendor[o.vendor_id]) prevByVendor[o.vendor_id] = 0;
      prevByVendor[o.vendor_id] += (o.total_amount || 0);
    }

    const totalThis = thisMonth.reduce((s, o) => s + (o.total_amount || 0), 0);
    const totalPrev = prevMonth.reduce((s, o) => s + (o.total_amount || 0), 0);
    const delta = totalThis - totalPrev;
    const deltaPct = totalPrev > 0 ? ((delta / totalPrev) * 100).toFixed(1) : 0;

    const activeCount = vList.filter(v => v.active).length;
    const totalVendors = vList.length;
    const avgPerVendor = activeCount > 0 ? totalThis / activeCount : 0;

    const unpaidTotal = thisMonth
      .filter(o => o.payment_status === 'pending' || o.payment_status === 'overdue')
      .reduce((s, o) => s + (o.total_amount || 0), 0);

    const ranked = vList
      .map(v => ({
        ...v,
        thisAmount: (thisByVendor[v.id]?.amount) || 0,
        thisCount: (thisByVendor[v.id]?.count) || 0,
        prevAmount: prevByVendor[v.id] || 0
      }))
      .sort((a, b) => b.thisAmount - a.thisAmount);

    container.innerHTML = `
      <div class="admin-stats">
        <div class="admin-stat">
          <div class="admin-stat-label">이번 달 총 매출</div>
          <div class="admin-stat-value">${(totalThis/10000).toFixed(0)}<span style="font-size:14px;color:var(--ink-soft)">만원</span></div>
          <div class="admin-stat-sub" style="color: ${totalPrev > 0 ? (delta >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--ink-soft)'}">${totalPrev > 0 ? ((delta >= 0 ? '↑' : '↓') + ' 전월대비 ' + Math.abs(deltaPct) + '%') : '전월 데이터 없음'}</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat-label">활성 거래처</div>
          <div class="admin-stat-value">${activeCount}<span style="font-size:14px;color:var(--ink-soft)">/${totalVendors}곳</span></div>
          <div class="admin-stat-sub">${totalVendors > 0 ? Math.round(activeCount / totalVendors * 100) : 0}% 활성률</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat-label">평균 거래처 매출</div>
          <div class="admin-stat-value">${(avgPerVendor/10000).toFixed(0)}<span style="font-size:14px;color:var(--ink-soft)">만</span></div>
          <div class="admin-stat-sub">활성 거래처 기준</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat-label">미수금 (대기+연체)</div>
          <div class="admin-stat-value ${unpaidTotal > 0 ? 'urgent' : ''}">${(unpaidTotal/10000).toFixed(0)}<span style="font-size:14px;color:var(--ink-soft)">만</span></div>
          <div class="admin-stat-sub">${unpaidTotal > 0 ? '입금 확인 필요' : '정상'}</div>
        </div>
      </div>

      <div class="admin-card">
        <div class="admin-card-head">
          <span class="admin-card-title">거래처별 매출 랭킹</span>
          <span class="badge gray">${now.getMonth()+1}월 기준</span>
        </div>
        <div class="admin-table-wrap">
          ${ranked.length === 0 ? '<div class="empty-state">데이터가 없습니다</div>' : `
            <table class="admin-table">
              <thead>
                <tr>
                  <th>순위</th>
                  <th>거래처</th>
                  <th>지역</th>
                  <th class="num">이번 달</th>
                  <th class="num">전월</th>
                  <th class="num">증감</th>
                  <th class="num">발주 횟수</th>
                </tr>
              </thead>
              <tbody>
                ${ranked.map((v, i) => {
                  const d = v.thisAmount - v.prevAmount;
                  const dPct = v.prevAmount > 0 ? Math.round((d/v.prevAmount)*100) : 0;
                  return `
                    <tr style="${!v.active ? 'opacity:0.55;' : ''}">
                      <td class="center"><b>${i+1}</b></td>
                      <td><b>${v.name}</b>${!v.active ? ' <span class="badge gray" style="margin-left:4px;">비활성</span>' : ''}</td>
                      <td>${v.region || '-'}</td>
                      <td class="num"><b>${v.thisAmount.toLocaleString()}원</b></td>
                      <td class="num" style="color:var(--ink-soft)">${v.prevAmount.toLocaleString()}원</td>
                      <td class="num" style="color: ${v.prevAmount > 0 ? (d >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--ink-soft)'}">${v.prevAmount > 0 ? ((d >= 0 ? '+' : '') + dPct + '%') : '-'}</td>
                      <td class="num">${v.thisCount}회</td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          `}
        </div>
      </div>
    `;
  } catch (e) {
    console.error(e);
    container.innerHTML = '<div class="empty-state">불러오기 실패</div>';
  }
}

      </div>

      <div class="admin-card" style="margin-top:20px;">
        <div class="admin-card-head">
          <span class="admin-card-title">거래처별 여신 한도</span>
          <span style="font-size:12px; color:var(--ink-soft);">한도 조정 시 즉시 반영됩니다</span>
        </div>
        <div id="financeVendorsContainer">
          <div class="empty-state">불러오는 중...</div>
        </div>
      </div>
    </div>
  `;
  loadAdminFinance();
}

async function loadAdminFinance() {
  try {
    const { data: vendors, error: vErr } = await sb
      .from('vendors')
      .select('id, vendor_id, name, region, phone, credit_limit, credit_used, active')
      .order('name');

    if (vErr) {
      console.error('Finance vendors load error:', vErr);
      $('financeVendorsContainer').innerHTML = '<div class="empty-state">불러오기 실패: ' + (vErr.message || '') + '</div>';
      return;
    }

    FINANCE_VENDORS_CACHE = vendors || [];
    const activeVendors = FINANCE_VENDORS_CACHE.filter(v => v.active);
    $('financeCountSub').textContent = `활성 거래처 ${activeVendors.length}곳 · 전체 ${FINANCE_VENDORS_CACHE.length}곳`;

    const { data: unpaidOrders, error: oErr } = await sb
      .from('orders')
      .select(`
        id, order_number, ship_date, total_amount, payment_status, created_at,
        vendors ( id, name )
      `)
      .in('payment_status', ['pending', 'overdue'])
      .eq('cancelled', false)
      .order('created_at', { ascending: true });

    if (oErr) {
      console.error('Unpaid orders load error:', oErr);
      $('financeUnpaidContainer').innerHTML = '<div class="empty-state">불러오기 실패</div>';
    } else {
      const orders = unpaidOrders || [];
      if (orders.length === 0) {
        $('financeUnpaidContainer').innerHTML = '<div class="empty-state" style="padding:30px;">입금 대기/연체 발주가 없습니다 🎉</div>';
      } else {
        const totalUnpaid = orders.reduce((s, o) => s + (o.total_amount || 0), 0);
        $('financeUnpaidContainer').innerHTML = `
          <div style="padding:14px 20px; background:var(--orange-soft); border-bottom:1px solid var(--gray-2); font-size:13px;">
            <b>합계 미수금:</b> <span style="color:var(--orange); font-weight:700; font-size:16px;">${totalUnpaid.toLocaleString()}원</span>
            <span style="color:var(--ink-soft); margin-left:10px;">(${orders.length}건)</span>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>발주번호</th>
                  <th>거래처</th>
                  <th>출고희망일</th>
                  <th>발주일</th>
                  <th class="num">금액</th>
                  <th class="center">상태</th>
                  <th class="center">처리</th>
                </tr>
              </thead>
              <tbody>
                ${orders.map(o => {
                  const created = new Date(o.created_at);
                  const daysAgo = Math.floor((Date.now() - created.getTime()) / (1000*60*60*24));
                  const dateStr = `${created.getFullYear()}.${String(created.getMonth()+1).padStart(2,'0')}.${String(created.getDate()).padStart(2,'0')}`;
                  return `
                    <tr>
                      <td style="font-size:12px;">${o.order_number}</td>
                      <td><b>${o.vendors?.name || '-'}</b></td>
                      <td>${o.ship_date.replace(/-/g, '.')}</td>
                      <td>${dateStr} <span style="color:var(--ink-soft); font-size:11px;">(${daysAgo}일 전)</span></td>
                      <td class="num"><b>${o.total_amount.toLocaleString()}원</b></td>
                      <td class="center">${renderPaymentStatus(o.payment_status)}</td>
                      <td class="center" style="white-space:nowrap;">
                        <button class="btn-sm" onclick="markPaymentPaid('${o.id}')">입금 완료</button>
                        ${o.payment_status === 'pending' ? `<button class="btn-sm outline danger" style="margin-left:4px;" onclick="markPaymentOverdue('${o.id}')">연체 처리</button>` : ''}
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      }
    }

    $('financeVendorsContainer').innerHTML = `
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>거래처</th>
              <th>지역</th>
              <th class="num">여신 한도</th>
              <th class="num">사용중</th>
              <th class="num">잔여</th>
              <th>사용률</th>
              <th class="center">상태</th>
              <th class="center">한도 조정</th>
            </tr>
          </thead>
          <tbody>
            ${FINANCE_VENDORS_CACHE.map(v => {
              const used = v.credit_used || 0;
              const limit = v.credit_limit || 0;
              const remain = limit - used;
              const pct = limit > 0 ? (used / limit) * 100 : 0;
              const warning = pct >= 70;
              return `
                <tr style="${!v.active ? 'opacity:0.55;' : ''}">
                  <td><b>${v.name}</b>${!v.active ? ' <span class="badge gray" style="margin-left:4px; font-size:10px;">비활성</span>' : ''}</td>
                  <td>${v.region || '-'}</td>
                  <td class="num">${limit.toLocaleString()}원</td>
                  <td class="num">${used.toLocaleString()}원</td>
                  <td class="num" style="color: ${remain < 0 ? 'var(--red)' : 'var(--ink-soft)'}">${remain.toLocaleString()}원</td>
                  <td style="min-width:110px;">
                    <div style="display:flex; align-items:center; gap:8px;">
                      <div style="flex:1; height:6px; background:var(--gray-2); border-radius:3px; overflow:hidden;">
                        <div style="height:100%; background:${warning ? 'var(--orange)' : 'var(--green)'}; width:${Math.min(pct, 100)}%;"></div>
                      </div>
                      <span style="font-size:11px; font-weight:600; color:${warning ? 'var(--orange)' : 'var(--ink-soft)'}; min-width:35px;">${pct.toFixed(0)}%</span>
                    </div>
                  </td>
                  <td class="center">${v.active ? '<span class="badge green">활성</span>' : '<span class="badge gray">비활성</span>'}</td>
                  <td class="center">
                    <button class="btn-sm outline" onclick="openCreditLimitModal('${v.id}')">여신 조정</button>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    console.error(e);
  }
}

async function markPaymentPaid(orderId) {
  if (!confirm('이 발주를 입금 완료 처리하시겠습니까?')) return;
  try {
    const { error } = await sb
      .from('orders')
      .update({ payment_status: 'paid' })
      .eq('id', orderId);
    if (error) {
      console.error(error);
      alert('처리 실패: ' + (error.message || ''));
      return;
    }
    showToast('입금 완료 처리됨');
    loadAdminFinance();
  } catch (e) {
    console.error(e);
    alert('처리 중 오류 발생');
  }
}

async function markPaymentOverdue(orderId) {
  if (!confirm('이 발주를 연체 처리하시겠습니까?\n(거래처에 별도 안내 필요)')) return;
  try {
    const { error } = await sb
      .from('orders')
      .update({ payment_status: 'overdue' })
      .eq('id', orderId);
    if (error) {
      console.error(error);
      alert('처리 실패');
      return;
    }
    showToast('연체 처리됨');
    loadAdminFinance();
  } catch (e) {
    console.error(e);
  }
}

function openCreditLimitModal(vendorId) {
  const v = FINANCE_VENDORS_CACHE.find(x => x.id === vendorId);
  if (!v) return;

  const html = `
    <div class="modal-overlay show" id="creditLimitModal" onclick="if(event.target===this) closeCreditLimitModal()">
      <div class="modal" style="max-width:460px;">
        <div class="modal-title">여신 정보 조정</div>
        <div style="text-align:center; margin-bottom:18px;">
          <div style="font-size:16px; font-weight:700;">${v.name}</div>
          <div style="font-size:12px; color:var(--ink-soft); margin-top:4px;">한도와 사용액을 자유롭게 조정할 수 있습니다</div>
        </div>

        <div class="form-group">
          <label class="form-label">여신 한도 (원)</label>
          <input type="number" class="form-input" id="cl_amount" value="${v.credit_limit || 0}" step="100000" style="font-size:17px; font-weight:700; text-align:right;">
          <div style="font-size:11px; color:var(--ink-soft); margin-top:6px;">
            현재 한도: ${(v.credit_limit || 0).toLocaleString()}원
          </div>
        </div>

        <div class="form-group" style="background:var(--yellow-soft); padding:14px; border-radius:8px; border:1px solid var(--yellow-deep);">
          <label class="form-label" style="display:flex; align-items:center; gap:6px;">
            여신 사용액 (원)
            <span style="font-size:10px; background:var(--yellow); color:var(--ink); padding:1px 6px; border-radius:3px; font-weight:700;">기존 거래처 이관용</span>
          </label>
          <input type="number" class="form-input" id="cl_used" value="${v.credit_used || 0}" step="100000" style="font-size:17px; font-weight:700; text-align:right; background:white;">
          <div style="font-size:11px; color:var(--ink-soft); margin-top:6px; line-height:1.5;">
            현재 사용액: ${(v.credit_used || 0).toLocaleString()}원<br>
            기존 시스템의 미수금을 그대로 입력하세요. 이후 신규 발주/입금은 자동 반영됩니다.
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">조정 사유 (선택)</label>
          <input type="text" class="form-input" id="cl_memo" placeholder="예: 기존 거래처 이관 / 한도 증액 등">
        </div>

        <div class="modal-buttons" style="margin-top:20px;">
          <button class="btn-secondary" onclick="closeCreditLimitModal()">취소</button>
          <button class="btn-primary" onclick="saveCreditLimit('${vendorId}')">저장</button>
        </div>
      </div>
    </div>
  `;
  const old = $('creditLimitModal');
  if (old) old.remove();
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeCreditLimitModal() {
  const m = $('creditLimitModal');
  if (m) m.remove();
}

async function saveCreditLimit(vendorId) {
  const v = FINANCE_VENDORS_CACHE.find(x => x.id === vendorId);
  if (!v) return;
  const newLimit = parseInt($('cl_amount').value) || 0;
  const newUsed = parseInt($('cl_used').value) || 0;
  const memo = $('cl_memo').value.trim();

  if (newLimit < 0) {
    alert('여신 한도는 0 이상이어야 합니다.');
    return;
  }
  if (newUsed < 0) {
    alert('여신 사용액은 0 이상이어야 합니다.');
    return;
  }

  const prevLimit = v.credit_limit || 0;
  const prevUsed = v.credit_used || 0;

  const limitChanged = newLimit !== prevLimit;
  const usedChanged = newUsed !== prevUsed;

  if (!limitChanged && !usedChanged && !memo) {
    alert('변경된 내용이 없습니다.');
    return;
  }

  // 한도가 사용액보다 작으면 경고
  if (newLimit > 0 && newLimit < newUsed) {
    if (!confirm(
      `⚠️ 새 한도(${newLimit.toLocaleString()}원)가 사용액(${newUsed.toLocaleString()}원)보다 작습니다.\n\n` +
      `이 상태에서는 거래처가 추가 발주를 할 수 없습니다.\n계속하시겠습니까?`
    )) return;
  }

  // 사용액 수동 조정 시 한 번 더 확인
  if (usedChanged) {
    if (!confirm(
      `여신 사용액을 ${prevUsed.toLocaleString()}원 → ${newUsed.toLocaleString()}원으로 변경합니다.\n\n` +
      `※ 신규 발주는 자동 누적되므로, 일반적으로 운영 시작 시점에만 사용하세요.\n계속하시겠습니까?`
    )) return;
  }

  try {
    const updates = {
      credit_limit: newLimit,
      credit_used: newUsed
    };

    // 메모 이력 자동 기록
    const changes = [];
    if (limitChanged) {
      changes.push(`한도 ${prevLimit.toLocaleString()} → ${newLimit.toLocaleString()}`);
    }
    if (usedChanged) {
      changes.push(`사용액 ${prevUsed.toLocaleString()} → ${newUsed.toLocaleString()}`);
    }

    if (changes.length > 0 || memo) {
      const today = new Date().toISOString().slice(0, 10);
      const memoPart = memo ? ` ${memo}` : '';
      const memoLine = `[${today} ${changes.join(', ')}]${memoPart}`;
      const prev = v.admin_memo || '';
      updates.admin_memo = prev ? (prev + '\n' + memoLine) : memoLine;
    }

    const { error } = await sb
      .from('vendors')
      .update(updates)
      .eq('id', vendorId);

    if (error) {
      console.error(error);
      alert('저장 실패: ' + (error.message || ''));
      return;
    }

    closeCreditLimitModal();
    const summary = [];
    if (limitChanged) summary.push(`한도 ${newLimit.toLocaleString()}원`);
    if (usedChanged) summary.push(`사용액 ${newUsed.toLocaleString()}원`);
    showToast(`${v.name} ${summary.join(' / ')}로 조정 완료`);
    loadAdminFinance();
  } catch (e) {
    console.error(e);
    alert('저장 중 오류 발생');
  }
}
