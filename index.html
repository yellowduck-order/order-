<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노랑오리 발주 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFD200;
    --yellow-soft: #FFF7CC;
    --yellow-deep: #E6BD00;
    --red: #C8102E;
    --red-deep: #9A0B22;
    --ink: #1A1A1A;
    --ink-soft: #444;
    --gray-1: #F7F6F2;
    --gray-2: #E8E6DD;
    --gray-3: #B8B5A8;
    --gray-4: #8B8983;
    --green: #2D7A3E;
    --green-soft: #E7F4EA;
    --orange: #E07B00;
    --orange-soft: #FFF1E0;
    --blue: #1E5BB8;
    --blue-soft: #E8F0FA;
    --shadow-soft: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-card: 0 4px 16px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { font-family: 'Noto Sans KR', sans-serif; color: var(--ink); background: var(--gray-1); -webkit-text-size-adjust: 100%; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, select, textarea { font-family: inherit; }

  /* ============ LOGIN ============ */
  .login-screen {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--yellow) 0%, #FFC700 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .login-screen::before {
    content: '';
    position: absolute;
    bottom: -50%;
    right: -20%;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .login-screen::after {
    content: '';
    position: absolute;
    top: -30%;
    left: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    border-radius: 50%;
  }
  .login-card {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
    z-index: 1;
  }
  .logo-mark {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
  }
  .logo-mark img { height: 70px; width: auto; display: block; }
  .logo-sub {
    margin-top: 14px;
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 2px;
    font-weight: 500;
  }
  .login-title {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
  }
  .login-desc {
    text-align: center;
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 24px;
  }
  .login-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--gray-1);
    padding: 4px;
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .login-tab {
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    border-radius: 7px;
    transition: all 0.15s;
  }
  .login-tab.active {
    background: white;
    color: var(--ink);
    box-shadow: var(--shadow-soft);
  }
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    border: 2px solid var(--gray-2);
    border-radius: 12px;
    transition: border-color 0.2s, background 0.2s;
    background: var(--gray-1);
  }
  .form-input:focus {
    outline: none;
    border-color: var(--yellow-deep);
    background: white;
  }
  .btn-login {
    width: 100%;
    background: var(--ink);
    color: white;
    padding: 18px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    margin-top: 12px;
    transition: transform 0.1s, background 0.2s;
  }
  .btn-login:hover { background: #000; transform: translateY(-1px); }
  .login-help {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--gray-2);
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.7;
  }
  .login-help-title { font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .login-help-team { font-weight: 700; color: var(--ink); }
  .demo-hint {
    margin-top: 16px;
    padding: 12px;
    background: var(--yellow-soft);
    border-radius: 8px;
    font-size: 12px;
    color: var(--ink-soft);
    text-align: center;
  }
  .demo-hint b { color: var(--ink); }

  /* ============ COMMON TOP BAR ============ */
  .app { display: none; min-height: 100vh; }
  .app.active { display: block; }

  .top-bar {
    background: white;
    border-bottom: 1px solid var(--gray-2);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow-soft);
  }
  .top-left { display: flex; align-items: center; gap: 10px; }
  .top-left img { height: 28px; width: auto; display: block; }
  .top-title { font-size: 14px; font-weight: 700; color: var(--ink); }
  .top-title.admin {
    background: var(--ink);
    color: white;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
  }
  .top-right {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .user-chip {
    background: var(--gray-1);
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: 500;
  }
  .user-chip b { color: var(--red); }
  .btn-logout {
    color: var(--ink-soft);
    font-size: 12px;
    text-decoration: underline;
  }

  /* ============ CUSTOMER APP ============ */
  .deadline-banner {
    background: linear-gradient(90deg, #1A1A1A 0%, #2D2D2D 100%);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .deadline-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .deadline-pulse {
    width: 10px; height: 10px; background: var(--yellow);
    border-radius: 50%;
    box-shadow: 0 0 0 0 rgba(255,210,0,0.7);
    animation: pulse 1.5s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,210,0,0.7); }
    70% { box-shadow: 0 0 0 12px rgba(255,210,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,210,0,0); }
  }
  .deadline-text { font-size: 13px; color: rgba(255,255,255,0.85); }
  .deadline-time { font-weight: 700; color: var(--yellow); margin-left: 4px; font-size: 14px;}
  .countdown {
    background: rgba(255,210,0,0.15);
    color: var(--yellow);
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 12px;
    border: 1px solid rgba(255,210,0,0.3);
  }

  .tabs {
    background: white;
    border-bottom: 1px solid var(--gray-2);
    display: flex;
    overflow-x: auto;
    position: sticky;
    top: 53px;
    z-index: 40;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-soft);
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--red);
    font-weight: 700;
  }

  .page { display: none; padding: 16px; padding-bottom: 140px; }
  .page.active { display: block; }
  .container { max-width: 800px; margin: 0 auto; }
  .container-wide { max-width: 1200px; margin: 0 auto; }

  /* Credit card */
  .credit-card {
    background: white;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--gray-2);
  }
  .credit-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .credit-title { font-size: 13px; color: var(--ink-soft); font-weight: 500; }
  .credit-status {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .credit-status.ok { background: var(--green-soft); color: var(--green); }
  .credit-status.warning { background: var(--orange-soft); color: var(--orange); }
  .credit-numbers { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .credit-label { font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; }
  .credit-value { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .credit-bar {
    margin-top: 14px; height: 8px; background: var(--gray-2);
    border-radius: 4px; overflow: hidden;
  }
  .credit-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green) 0%, #4FA85F 100%);
    border-radius: 4px;
    transition: width 0.5s;
  }
  .credit-bar-fill.warning { background: linear-gradient(90deg, var(--orange) 0%, #F4A040 100%); }

  /* Section header */
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 20px 0 12px;
  }
  .section-title { font-size: 17px; font-weight: 700; }
  .section-sub { font-size: 12px; color: var(--ink-soft); }

  /* Ship date box */
  .ship-date-box {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid var(--gray-2);
  }
  .ship-date-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--ink-soft); }
  .ship-date-input {
    width: 100%; padding: 14px; font-size: 15px;
    border: 2px solid var(--gray-2);
    border-radius: 10px;
    background: var(--gray-1);
    font-weight: 600;
  }
  .ship-date-input:focus { outline: none; border-color: var(--yellow-deep); background: white; }
  .ship-date-hint { margin-top: 8px; font-size: 11px; color: var(--ink-soft); line-height: 1.5; }

  /* Product cards */
  .product-grid { display: flex; flex-direction: column; gap: 12px; }
  .product-card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    display: flex;
    gap: 14px;
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--gray-2);
    transition: border-color 0.2s;
  }
  .product-card.in-cart {
    border-color: var(--yellow-deep);
    background: linear-gradient(180deg, #FFFDF5 0%, white 100%);
  }
  .product-thumb {
    width: 90px; height: 90px; border-radius: 10px;
    background: var(--gray-1);
    flex-shrink: 0; overflow: hidden;
  }
  .product-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .product-info { flex: 1; min-width: 0; }
  .product-cat { font-size: 11px; color: var(--red); font-weight: 600; margin-bottom: 2px; letter-spacing: 0.3px; }
  .product-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
  .product-name .weight { font-weight: 500; color: var(--ink-soft); font-size: 14px; margin-left: 2px; }
  .product-meta { font-size: 11px; color: var(--ink-soft); margin-bottom: 8px; }
  .product-bottom {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; flex-wrap: wrap;
  }
  .product-price { font-size: 15px; font-weight: 700; }
  .product-price small { font-size: 11px; color: var(--ink-soft); font-weight: 400; }

  /* Qty control */
  .qty-control {
    display: flex; align-items: center;
    background: white;
    border: 1.5px solid var(--gray-2);
    border-radius: 8px;
    overflow: hidden;
  }
  .qty-btn {
    width: 32px; height: 32px;
    font-size: 18px; font-weight: 700;
    color: var(--ink);
    transition: background 0.15s;
  }
  .qty-btn:hover { background: var(--gray-1); }
  .qty-input {
    width: 44px; height: 32px;
    text-align: center;
    font-size: 14px; font-weight: 700;
    border: none;
    border-left: 1px solid var(--gray-2);
    border-right: 1px solid var(--gray-2);
    background: white;
  }
  .qty-input:focus { outline: none; background: var(--yellow-soft); }
  .qty-suffix { font-size: 11px; color: var(--ink-soft); margin-left: 6px; font-weight: 500; }

  /* Cart bar */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--gray-2);
    padding: 14px 16px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    z-index: 60;
    display: none;
  }
  .cart-bar.show { display: block; }
  .cart-inner {
    max-width: 800px; margin: 0 auto;
    display: flex; align-items: center; gap: 12px;
  }
  .cart-summary { flex: 1; }
  .cart-count { font-size: 12px; color: var(--ink-soft); margin-bottom: 2px; }
  .cart-count b { color: var(--red); font-weight: 700; }
  .cart-total { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .btn-submit {
    background: var(--ink);
    color: white;
    padding: 14px 24px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    transition: background 0.2s;
  }
  .btn-submit:hover { background: var(--red); }

  /* History */
  .history-list { display: flex; flex-direction: column; gap: 12px; }
  .history-card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--gray-2);
  }
  .history-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px dashed var(--gray-2);
  }
  .history-date { font-size: 13px; font-weight: 700; }
  .history-status {
    font-size: 11px; padding: 4px 10px;
    border-radius: 12px; font-weight: 600;
  }
  .history-status.delivered { background: var(--green-soft); color: var(--green); }
  .history-status.shipping { background: var(--orange-soft); color: var(--orange); }
  .history-status.preparing { background: var(--yellow-soft); color: var(--ink-soft); }
  .history-status.pending { background: var(--blue-soft); color: var(--blue); }
  .history-items { font-size: 13px; color: var(--ink-soft); line-height: 1.7; }
  .history-amount {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--gray-2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .history-amount-label { font-size: 12px; color: var(--ink-soft); }
  .history-amount-value { font-size: 17px; font-weight: 700; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-card {
    background: white; border-radius: 14px; padding: 16px;
    box-shadow: var(--shadow-soft); border: 1px solid var(--gray-2);
  }
  .stat-label { font-size: 12px; color: var(--ink-soft); margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .stat-sub { font-size: 11px; color: var(--green); margin-top: 4px; font-weight: 600; }
  .stat-sub.down { color: var(--red); }
  .ranking-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px;}
  .ranking-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px; background: var(--gray-1); border-radius: 10px;
  }
  .rank-num {
    width: 24px; height: 24px; background: var(--ink); color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .rank-num.gold { background: #D4A017; }
  .rank-num.silver { background: #999; }
  .rank-num.bronze { background: #B8753E; }
  .rank-name { flex: 1; font-size: 13px; font-weight: 600; }
  .rank-qty { font-size: 12px; color: var(--ink-soft); }

  /* ============ ADMIN APP ============ */
  .admin-top {
    background: #1A1A1A;
    color: white;
    border-bottom: 1px solid #000;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .admin-top img { 
    height: 22px; 
    background: white; 
    padding: 4px 8px; 
    border-radius: 4px; 
    display: block; 
  }
  .admin-top .top-title.admin {
    background: var(--yellow);
    color: var(--ink);
    font-weight: 700;
  }
  .admin-top .user-chip { background: rgba(255,255,255,0.1); color: white; }
  .admin-top .btn-logout { color: rgba(255,255,255,0.7); }

  .admin-tabs {
    background: white;
    border-bottom: 1px solid var(--gray-2);
    display: flex;
    overflow-x: auto;
    position: sticky;
    top: 49px;
    z-index: 40;
  }
  .admin-tabs::-webkit-scrollbar { display: none; }
  .admin-tab {
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-soft);
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .admin-tab.active {
    color: var(--ink);
    border-bottom-color: var(--yellow-deep);
    font-weight: 700;
  }

  .admin-page { display: none; padding: 20px; }
  .admin-page.active { display: block; }

  .admin-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  @media (max-width: 900px) {
    .admin-stats { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 500px) {
    .admin-stats { grid-template-columns: 1fr; }
  }
  .admin-stat {
    background: white;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid var(--gray-2);
  }
  .admin-stat-label { font-size: 12px; color: var(--ink-soft); margin-bottom: 4px; }
  .admin-stat-value { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .admin-stat-value.urgent { color: var(--red); }
  .admin-stat-sub { font-size: 11px; color: var(--ink-soft); margin-top: 4px; }

  /* Admin table */
  .admin-card {
    background: white;
    border-radius: 14px;
    border: 1px solid var(--gray-2);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .admin-card-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--gray-2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--gray-1);
  }
  .admin-card-title { font-size: 15px; font-weight: 700; }
  .admin-table-wrap { overflow-x: auto; }
  .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .admin-table th {
    background: var(--gray-1);
    padding: 12px 14px;
    text-align: left;
    font-weight: 600;
    color: var(--ink-soft);
    font-size: 12px;
    border-bottom: 1px solid var(--gray-2);
    white-space: nowrap;
  }
  .admin-table td {
    padding: 14px;
    border-bottom: 1px solid var(--gray-2);
    vertical-align: middle;
  }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover { background: var(--gray-1); }
  .admin-table .num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .admin-table .center { text-align: center; }

  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge.green { background: var(--green-soft); color: var(--green); }
  .badge.orange { background: var(--orange-soft); color: var(--orange); }
  .badge.gray { background: var(--gray-2); color: var(--ink-soft); }
  .badge.blue { background: var(--blue-soft); color: var(--blue); }
  .badge.red { background: #FCEBEB; color: var(--red); }
  .badge.yellow { background: var(--yellow-soft); color: var(--ink); }

  .btn-sm {
    padding: 6px 12px;
    background: var(--ink);
    color: white;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    transition: background 0.15s;
  }
  .btn-sm:hover { background: #000; }
  .btn-sm.outline {
    background: white;
    color: var(--ink);
    border: 1px solid var(--gray-3);
  }
  .btn-sm.outline:hover { background: var(--gray-1); }
  .btn-sm.danger { background: var(--red); }

  /* Vendor list */
  .vendor-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .vendor-card {
    background: white;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid var(--gray-2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .vendor-card:hover {

  }
  .vendor-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .vendor-id { font-size: 12px; color: var(--ink-soft); margin-bottom: 12px; }
  .vendor-meta {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; font-size: 12px;
    padding-top: 12px; border-top: 1px solid var(--gray-2);
  }
  .vendor-meta-label { color: var(--ink-soft); }
  .vendor-meta-value { font-weight: 600; }

  /* Vendor detail modal */
  .vendor-detail-wrap {
    display: none;
  }
  .vendor-detail-wrap.show { display: block; }
  .vendor-detail-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 600;
    cursor: pointer;
  }
  .vendor-detail-back:hover { color: var(--ink); }

  .price-edit-input {
    width: 100px;
    padding: 6px 10px;
    border: 1.5px solid var(--gray-2);
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .price-edit-input:focus {
    outline: none;
    border-color: var(--yellow-deep);
    background: var(--yellow-soft);
  }
  .price-edit-input.changed {
    border-color: var(--yellow-deep);
    background: var(--yellow-soft);
  }

  .save-banner {
    position: sticky;
    bottom: 0;
    background: var(--ink);
    color: white;
    padding: 14px 20px;
    margin: -14px -14px -14px -14px;
    margin-top: 14px;
    border-radius: 0 0 14px 14px;
    display: none;
    align-items: center;
    justify-content: space-between;
  }
  .save-banner.show { display: flex; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100; padding: 16px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white;
    border-radius: 20px;
    max-width: 420px; width: 100%;
    padding: 28px 24px;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; }
  .modal-icon {
    width: 56px; height: 56px;
    background: var(--yellow);
    border-radius: 50%;
    margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .modal-icon.success { background: var(--green-soft); }
  .modal-summary {
    background: var(--gray-1);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
    font-size: 13px;
    line-height: 1.8;
  }
  .modal-summary-row { display: flex; justify-content: space-between; }
  .modal-summary-row.total {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--gray-2);
    font-weight: 700; font-size: 15px;
  }
  .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn-secondary {
    background: var(--gray-2); color: var(--ink);
    padding: 14px; border-radius: 10px;
    font-weight: 700; font-size: 14px;
  }
  .btn-primary {
    background: var(--ink); color: white;
    padding: 14px; border-radius: 10px;
    font-weight: 700; font-size: 14px;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--ink); color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px; font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (min-width: 768px) {
    .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .stats-row { grid-template-columns: repeat(4, 1fr); }
  }

  .demo-badge {
    position: fixed;
    bottom: 16px; left: 16px;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    z-index: 30;
    letter-spacing: 0.3px;
  }
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
  }

<!-- MODALS -->
<div class="modal-overlay" id="confirmModal">

    <div class="modal-icon">📋</div>
    <div class="modal-title">발주 내역을 확인해주세요</div>

      <button class="btn-secondary" onclick="closeModal('confirmModal')">취소</button>
      <button class="btn-primary" onclick="submitOrder()">발주 확정</button>

    <div class="modal-buttons" style="grid-template-columns:1fr">

<div class="modal-overlay" id="signupModal">

    </div>

    <div class="form-group">
      <label class="form-label">상호명 <span style="color:var(--red)">*</span></label>

    <div class="form-group">

    </div>
    <div class="form-group">
      <label class="form-label">대표자명 <span style="color:var(--red)">*</span></label>
      <input type="text" class="form-input" id="su_owner" placeholder="홍길동">
    </div>
    <div class="form-group">
      <label class="form-label">연락처 <span style="color:var(--red)">*</span></label>
      <input type="tel" class="form-input" id="su_phone" placeholder="010-0000-0000">
    </div>
    <div class="form-group">
      <label class="form-label">사업장 주소 <span style="color:var(--red)">*</span></label>
      <input type="text" class="form-input" id="su_addr" placeholder="시/도 시/군/구 도로명 건물번호">
    </div>
    <div class="form-group">
      <label class="form-label">희망 아이디 <span style="color:var(--red)">*</span></label>
      <input type="text" class="form-input" id="su_id" placeholder="영문/숫자 4자 이상 (예: kim_busan)" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">희망 비밀번호 <span style="color:var(--red)">*</span></label>
      <input type="password" class="form-input" id="su_pw" placeholder="6자 이상 (영문/숫자 조합 권장)" autocomplete="new-password">

      </div>
    </div>
    <div class="form-group">
      <label class="form-label">메모 (선택)</label>
      <textarea class="form-input" id="su_memo" rows="3" placeholder="원하시는 주력 품목, 월 예상 발주량 등을 적어주시면 검토에 도움이 됩니다" style="resize:vertical; min-height:80px; font-family:inherit;"></textarea>
    </div>

    <div class="modal-buttons" style="margin-top: 20px;">
      <button class="btn-secondary" onclick="closeModal('signupModal')">취소</button>
      <button class="btn-primary" onclick="submitSignup()">신청 제출</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="signupSuccessModal">

function getProduct(id) {
  const source = LIVE_PRODUCTS.length > 0 ? LIVE_PRODUCTS : PRODUCTS;
  return source.find(p => p.id === id);
}

function getProductPrice(id, vendorPrices) {
  if (vendorPrices && vendorPrices[id] !== undefined) return vendorPrices[id];
  const p = getProduct(id);
  return p ? p.basePrice : 0;
}

function formatLocalDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function tomorrowDate() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  while (d.getDay() === 0 || d.getDay() === 6) {
    d.setDate(d.getDate() + 1);
  }
  return formatLocalDate(d);
}

function isWeekend(dateStr) {
  const [y, m, day] = dateStr.split('-').map(Number);
  const d = new Date(y, m - 1, day);
  return d.getDay() === 0 || d.getDay() === 6;
}

function nextWeekday(dateStr) {
  const [y, m, day] = dateStr.split('-').map(Number);
  const d = new Date(y, m - 1, day);
  while (d.getDay() === 0 || d.getDay() === 6) {
    d.setDate(d.getDate() + 1);
  }
  return formatLocalDate(d);
}

function handleShipDateChange(input) {
  const val = input.value;
  if (!val) return;
  if (isWeekend(val)) {
    const adjusted = nextWeekday(val);
    input.value = adjusted;
    const dayNames = ['일','월','화','수','목','금','토'];
    const [y, m, day] = adjusted.split('-').map(Number);
    const adjDate = new Date(y, m - 1, day);
    showToast(`토/일은 출고 불가입니다. ${adjusted.replace(/-/g, '.')} (${dayNames[adjDate.getDay()]})로 변경되었습니다`);
  }
}

function generateOrderNumber() {
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const rand = String(Math.floor(Math.random() * 99999)).padStart(5, '0');
  return `YD${today}-${rand}`;
}

async function submitSignup() {

  const owner = $('su_owner').value.trim();
  const phone = $('su_phone').value.trim();
  const addr = $('su_addr').value.trim();
  const preferredId = $('su_id').value.trim();
  const preferredPw = $('su_pw').value;
  const memo = $('su_memo').value.trim();

  if (!name || !biz || !owner || !phone || !addr || !preferredId || !preferredPw) {
    alert('필수 항목(*)을 모두 입력해주세요.');
    return;
  }

  if (preferredId.length < 4) {
    alert('아이디는 4자 이상 입력해주세요.');
    return;
  }
  if (!/^[a-zA-Z0-9_]+$/.test(preferredId)) {
    alert('아이디는 영문/숫자/언더스코어(_)만 사용 가능합니다.');
    return;
  }
  if (preferredPw.length < 6) {
    alert('비밀번호는 6자 이상 입력해주세요.');
    return;
  }

  const num = 'YDS' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '-' + String(Math.floor(Math.random()*900)+100).padStart(4,'0');

  try {
    const { error } = await sb.from('signup_requests').insert({
      request_number: num,
      store_name: name,
      biz_number: biz,
      owner_name: owner,
      phone: phone,
      address: addr,
      preferred_id: preferredId,
      preferred_password: preferredPw,
      memo: memo || null,
      status: 'pending'
    });

    if (error) {
      console.error(error);
      if (error.message && error.message.includes('preferred_password')) {
        alert('DB 스키마 업데이트가 필요합니다. 관리자에게 문의해주세요.');
      } else {
        alert('신청 접수 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
      }
      return;
    }

    $('signupNumber').textContent = num;
    closeModal('signupModal');
    setTimeout(() => $('signupSuccessModal').classList.add('show'), 200);
  } catch (e) {
    console.error(e);
    alert('신청 접수 중 오류가 발생했습니다.');
  }
}

async function doLogin() {
  const mode = $('tabAdmin').classList.contains('active') ? 'admin' : 'customer';
  const id = $('loginId').value.trim();
  const pw = $('loginPw').value;

  if (!id || !pw) {
    alert('아이디와 비밀번호를 모두 입력해주세요.');
    return;
  }

  const btn = document.querySelector('.btn-login');
  if (btn) { btn.disabled = true; btn.textContent = '로그인 중...'; }

  try {
    if (mode === 'admin') {
      const { data, error } = await sb.auth.signInWithPassword({
        email: id,
        password: pw
      });

      if (error) {
        alert('이메일 또는 비밀번호가 올바르지 않습니다.');
        return;
      }

      const role = data.user?.user_metadata?.role;
      const name = data.user?.user_metadata?.name || '관리자';

      if (role !== 'master' && role !== 'staff' && role !== 'accounting') {
        await sb.auth.signOut();
        alert('관리자 권한이 없는 계정입니다.');
        return;
      }

      currentMode = 'admin';
      adminRole = role;
      currentUser = { name: name, role: role, email: id };
      renderAdminApp();
    } else {
      const loginEmail = id.includes('@') ? id : `${id}@yd.local`;
      const { data, error } = await sb.auth.signInWithPassword({
        email: loginEmail,
        password: pw
      });

      if (error) {
        alert('아이디 또는 비밀번호가 올바르지 않습니다.');
        return;
      }

      const { data: vendor, error: vErr } = await sb
        .from('vendors')
        .select('*')
        .eq('auth_user_id', data.user.id)
        .single();

      if (vErr || !vendor) {
        await sb.auth.signOut();
        alert('등록되지 않은 거래처입니다. 유통팀에 문의해주세요.');
        return;
      }

      if (!vendor.active) {
        await sb.auth.signOut();
        alert('비활성화된 거래처입니다. 유통팀에 문의해주세요.');
        return;
      }

      currentMode = 'customer';
      currentUser = {
        id: vendor.id,
        vendor_id: vendor.vendor_id,
        name: vendor.name,
        region: vendor.region,
        creditLimit: vendor.credit_limit,
        creditUsed: vendor.credit_used,
        active: vendor.active,
        prices: {},
        monthlyAmount: 0,
        prevMonthAmount: 0,
        monthlyOrders: 0
      };

      const { data: productsData, error: pErr } = await sb
        .from('products')
        .select('*')
        .eq('active', true)
        .order('code');

      if (pErr) {
        console.error('Products fetch error:', pErr);
        alert('상품 정보를 불러오는 중 오류가 발생했습니다.');
        return;
      }

      const { data: pricesData, error: prErr } = await sb
        .from('vendor_prices')
        .select('product_id, custom_price')
        .eq('vendor_id', vendor.id);

      if (prErr) {
        console.error('Prices fetch error:', prErr);
      }

      LIVE_PRODUCTS = productsData.map(p => ({
        id: p.id,
        code: p.code,
        cat: p.category,
        name: p.name,
        weight: p.weight,
        spec: p.spec,
        basePrice: p.base_price,
        imageUrl: p.image_url || null
      }));

      const priceMap = {};
      if (pricesData) {
        for (const row of pricesData) {
          priceMap[row.product_id] = row.custom_price;
        }
      }
      currentUser.prices = priceMap;

      renderCustomerApp();
    }
  } catch (e) {
    console.error(e);
    alert('로그인 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '로그인'; }
  }
}

            <div class="product-price">${price.toLocaleString()}원<small>/박스</small></div>
            <div style="display:flex; align-items:center;">
              <div class="qty-control">
                <button class="qty-btn" onclick="changeQty('${p.id}', -1)">−</button>
                <input type="number" class="qty-input" id="qty-${p.id}" value="${cart[p.id] || 0}" min="0" oninput="setQty('${p.id}', this.value)">
                <button class="qty-btn" onclick="changeQty('${p.id}', 1)">+</button>
              </div>
              <span class="qty-suffix">박스</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function changeQty(id, delta) {
  const current = cart[id] || 0;
  setQty(id, Math.max(0, current + delta));
}

function setQty(id, val) {
  const n = Math.max(0, parseInt(val) || 0);
  if (n === 0) delete cart[id];
  else cart[id] = n;
  const input = $('qty-' + id);
  if (input) input.value = n;
  const card = $('card-' + id);
  if (card) {
    if (n > 0) card.classList.add('in-cart');
    else card.classList.remove('in-cart');
  }
  updateCartBar();
}

function updateCartBar() {
  const v = currentUser;
  const items = Object.keys(cart);
  const totalBoxes = items.reduce((s, id) => s + cart[id], 0);
  const totalAmount = items.reduce((s, id) => {
    return s + getProductPrice(id, v.prices) * cart[id];
  }, 0);
  $('cartCount').textContent = items.length;
  $('cartBoxes').textContent = totalBoxes + '박스';
  $('cartTotal').textContent = totalAmount.toLocaleString() + '원';
  $('cartBar').classList.toggle('show', items.length > 0);
}

function switchCustomerTab(ev, name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  ev.currentTarget.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $('page-' + name).classList.add('active');

  if (name === 'history') loadOrderHistory();
  else if (name === 'stats') loadStatsPage();
}

async function loadOrderHistory() {
  const v = currentUser;
  const container = $('historyContent');
  if (!container) return;

  try {
    const thirtyDaysAgo = new Date();
    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
    const cutoff = thirtyDaysAgo.toISOString();

    const { data: orders, error } = await sb
      .from('orders')
      .select(`
        id,
        order_number,
        ship_date,
        total_amount,
        total_boxes,
        payment_status,
        memo,
        status,
        confirmed,
        cancelled,
        cancel_reason,
        created_at,
        order_items (
          quantity,
          unit_price,
          subtotal,
          products ( name, weight, code )
        )
      `)
      .eq('vendor_id', v.id)
      .gte('created_at', cutoff)
      .order('created_at', { ascending: false });

    if (error) {
      console.error('History load error:', error);
      container.innerHTML = '<div class="empty-state">주문 내역을 불러오지 못했습니다.</div>';
      return;
    }

    if (!orders || orders.length === 0) {
      container.innerHTML = '<div class="empty-state">아직 주문 내역이 없습니다</div>';
      return;
    }

    container.innerHTML = `
      <div class="history-list">
        ${orders.map(o => {
          const d = new Date(o.created_at);
          const dateStr = d.getFullYear() + '.' +
            String(d.getMonth()+1).padStart(2,'0') + '.' +
            String(d.getDate()).padStart(2,'0');
          const dayNames = ['일','월','화','수','목','금','토'];
          const dayStr = dayNames[d.getDay()];
          const itemsList = (o.order_items || []).map(it => {
            const pname = it.products ? `${it.products.name} ${it.products.weight}` : '품목';
            return `${pname} · ${it.quantity}박스`;
          }).join('<br>');

          // 상태 배지: 취소 → 확인 전 → 출고 상태
          let statusBadge;
          if (o.cancelled) {
            statusBadge = '<span class="history-status" style="background:var(--gray-2); color:var(--ink-soft);">취소됨</span>';
          } else if (!o.confirmed) {
            statusBadge = '<span class="history-status" style="background:var(--yellow-soft); color:#854F0B; border:1px solid var(--yellow-deep);">확인 대기 중</span>';
          } else {
            const statusLabel = {
              'preparing': { text: '준비중', cls: 'preparing' },
              'shipping': { text: '출고중', cls: 'shipping' },
              'delivered': { text: '출고 완료', cls: 'delivered' }
            }[o.status] || { text: o.status, cls: 'preparing' };
            statusBadge = `<span class="history-status ${statusLabel.cls}">${statusLabel.text}</span>`;
          }

          const paymentLabel = {
            'paid': '입금 완료',
            'pending': '입금 대기',
            'overdue': '연체'
          }[o.payment_status] || o.payment_status;

          // 취소 가능 여부: 확인 전 + 취소 안 됨
          const canCancel = !o.confirmed && !o.cancelled;

          return `
            <div class="history-card" style="${o.cancelled ? 'opacity:0.6;' : ''}">
              <div class="history-head">
                <span class="history-date">${dateStr} (${dayStr}) · <span style="color:var(--ink-soft); font-weight:500; font-size:12px;">${o.order_number}</span></span>
                ${statusBadge}
              </div>
              <div class="history-items">${itemsList}</div>
              ${o.memo ? `<div style="margin-top:10px; padding:10px; background:var(--yellow-soft); border-radius:8px; font-size:12px; color:var(--ink-soft);"><b style="color:var(--ink);">요청사항:</b> ${o.memo}</div>` : ''}
              ${o.cancelled && o.cancel_reason ? `<div style="margin-top:10px; padding:10px; background:var(--gray-1); border-radius:8px; font-size:12px; color:var(--ink-soft);"><b style="color:var(--red);">취소 사유:</b> ${o.cancel_reason}</div>` : ''}
              <div class="history-amount">
                <span class="history-amount-label">${o.cancelled ? '<s>발주 금액</s>' : '총 발주 금액'} · ${o.cancelled ? '' : `<span style="color:${o.payment_status === 'paid' ? 'var(--green)' : o.payment_status === 'overdue' ? 'var(--red)' : 'var(--orange)'}">${paymentLabel}</span>`}</span>
                <span class="history-amount-value" style="${o.cancelled ? 'text-decoration:line-through; color:var(--ink-soft);' : ''}">${o.total_amount.toLocaleString()}원</span>
              </div>
              ${canCancel ? `
                <div style="margin-top:12px; padding-top:12px; border-top:1px solid var(--gray-2);">
                  <button class="btn-sm danger" style="width:100%;" onclick="openCancelOrderModal('${o.id}', '${o.order_number}')">발주 취소하기</button>
                  <div style="font-size:11px; color:var(--ink-soft); text-align:center; margin-top:6px;">노랑오리 확인 전이라 취소 가능합니다</div>
                </div>
              ` : ''}
            </div>
          `;
        }).join('')}
      </div>
    `;
  } catch (e) {
    console.error(e);
    container.innerHTML = '<div class="empty-state">주문 내역을 불러오지 못했습니다.</div>';
  }
}

// 거래처가 자기 발주 취소
function openCancelOrderModal(orderId, orderNumber) {
  const html = `
    <div class="modal-overlay show" id="cancelOrderModal" onclick="if(event.target===this) closeCancelOrderModal()">
      <div class="modal" style="max-width:420px;">
        <div class="modal-title">발주 취소</div>
        <div style="text-align:center; margin-bottom:16px;">
          <div style="font-size:13px; color:var(--ink-soft);">발주번호</div>
          <div style="font-size:14px; font-weight:700; color:var(--ink); margin-top:4px;">${orderNumber}</div>
        </div>
        <div class="form-group">
          <label class="form-label">취소 사유 (선택)</label>
          <textarea class="form-input" id="co_reason" rows="3" placeholder="예: 수량을 잘못 입력했어요, 사정상 다음 주로 미루고 싶어요" style="resize:vertical; min-height:70px; font-family:inherit;"></textarea>
        </div>
        <div style="background:var(--yellow-soft); padding:12px; border-radius:8px; font-size:12px; color:#5F3700; line-height:1.6; margin-bottom:16px;">
          ⚠️ 취소 후에는 되돌릴 수 없습니다.<br>새로 발주하시려면 [품목 둘러보기] 화면에서 다시 작성해주세요.
        </div>
        <div class="modal-buttons">
          <button class="btn-secondary" onclick="closeCancelOrderModal()">아니요</button>
          <button class="btn-primary" style="background:var(--red); color:white;" onclick="confirmCancelOrder('${orderId}')">취소하기</button>
        </div>
      </div>
    </div>
  `;
  const old = $('cancelOrderModal');
  if (old) old.remove();
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeCancelOrderModal() {
  const m = $('cancelOrderModal');
  if (m) m.remove();
}

async function confirmCancelOrder(orderId) {
  const reason = $('co_reason').value.trim();

  const btn = document.querySelector('#cancelOrderModal .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; }

  try {
    // 1. 발주 데이터 조회 (재확인 — confirmed 안 되었는지 + 사용액 차감 위해)
    const { data: order, error: oErr } = await sb
      .from('orders')
      .select('id, total_amount, vendor_id, confirmed, cancelled')
      .eq('id', orderId)
      .single();

    if (oErr || !order) {
      alert('발주를 찾을 수 없습니다.');
      return;
    }
    if (order.confirmed) {
      alert('이미 노랑오리에서 확인한 발주입니다.\n수정/취소는 노랑오리에 직접 연락해주세요.');
      closeCancelOrderModal();
      loadOrderHistory();
      return;
    }
    if (order.cancelled) {
      alert('이미 취소된 발주입니다.');
      closeCancelOrderModal();
      loadOrderHistory();
      return;
    }

    // 2. orders 업데이트 — cancelled 처리
    const { error: uErr } = await sb
      .from('orders')
      .update({
        cancelled: true,
        cancelled_at: new Date().toISOString(),
        cancel_reason: reason || '거래처 자체 취소',
        cancelled_by: currentUser.vendor_id || 'vendor'
      })
      .eq('id', orderId);

    if (uErr) {
      console.error(uErr);
      alert('취소 처리 실패: ' + (uErr.message || ''));
      return;
    }

    // 3. 여신 사용액 차감
    const { data: v } = await sb
      .from('vendors')
      .select('credit_used')
      .eq('id', order.vendor_id)
      .single();
    if (v) {
      const newUsed = Math.max(0, (v.credit_used || 0) - (order.total_amount || 0));
      await sb
        .from('vendors')
        .update({ credit_used: newUsed })
        .eq('id', order.vendor_id);
    }

    // 4. 변경 이력 기록
    await sb.from('order_history').insert({
      order_id: orderId,
      action_type: 'cancel',
      action_by: currentUser.vendor_id || 'vendor',
      action_role: 'vendor',
      reason: reason || '거래처 자체 취소',
      changes: { cancelled: { from: false, to: true } }
    });

    closeCancelOrderModal();
    showToast('발주가 취소되었습니다');
    loadOrderHistory();
  } catch (e) {
    console.error(e);
    alert('취소 처리 중 오류 발생');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '취소하기'; }
  }
}

    </div>
  `;

async function loadStatsPage() {
  const v = currentUser;
  const container = $('statsContent');
  if (!container) return;

  try {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
    const prevMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString();

    const { data: thisMonth, error: e1 } = await sb
      .from('orders')
      .select('id, total_amount, total_boxes, payment_status')
      .eq('vendor_id', v.id)
      .gte('created_at', monthStart);

    const { data: prevMonth, error: e2 } = await sb
      .from('orders')
      .select('total_amount')
      .eq('vendor_id', v.id)
      .gte('created_at', prevMonthStart)
      .lt('created_at', monthStart);

    if (e1 || e2) {
      console.error('Stats load error:', e1 || e2);
      container.innerHTML = '<div class="empty-state">구매 현황을 불러오지 못했습니다.</div>';
      return;
    }

    const thisAmount = (thisMonth || []).reduce((s, o) => s + (o.total_amount || 0), 0);
    const thisOrders = (thisMonth || []).length;
    const thisBoxes = (thisMonth || []).reduce((s, o) => s + (o.total_boxes || 0), 0);
    const avgBoxes = thisOrders > 0 ? Math.round(thisBoxes / thisOrders) : 0;
    const unpaid = (thisMonth || [])
      .filter(o => o.payment_status === 'pending' || o.payment_status === 'overdue')
      .reduce((s, o) => s + (o.total_amount || 0), 0);

    const prevAmount = (prevMonth || []).reduce((s, o) => s + (o.total_amount || 0), 0);
    const delta = thisAmount - prevAmount;
    const deltaPct = prevAmount ? Math.round((delta / prevAmount) * 100) : 0;

    const orderIds = (thisMonth || []).map(o => o.id);
    let rankingHtml = '<div class="empty-state" style="padding:20px;">아직 발주 내역이 없습니다</div>';

    if (orderIds.length > 0) {
      const { data: items, error: e3 } = await sb
        .from('order_items')
        .select('quantity, product_id, products(name, weight)')
        .in('order_id', orderIds);

      if (!e3 && items) {
        const totals = {};
        for (const it of items) {
          const key = it.product_id;
          if (!totals[key]) {
            totals[key] = {
              name: it.products?.name || '품목',
              weight: it.products?.weight || '',
              qty: 0
            };
          }
          totals[key].qty += it.quantity;
        }
        const ranked = Object.values(totals).sort((a, b) => b.qty - a.qty).slice(0, 5);
        if (ranked.length > 0) {
          const rankClasses = ['gold', 'silver', 'bronze', '', ''];
          rankingHtml = '<div class="ranking-list">' + ranked.map((r, i) =>
            `<div class="ranking-row">
              <div class="rank-num ${rankClasses[i]}">${i+1}</div>
              <div class="rank-name">${r.name} ${r.weight}</div>
              <div class="rank-qty">${r.qty}박스</div>
            </div>`
          ).join('') + '</div>';
        }
      }
    }

    container.innerHTML = `
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">이번 달 발주액</div>
          <div class="stat-value">${(thisAmount/10000).toFixed(0)}<small style="font-size:12px;color:var(--ink-soft)">만</small></div>
          <div class="stat-sub ${delta < 0 ? 'down' : ''}">${prevAmount > 0 ? (delta >= 0 ? '↑' : '↓') + ' 전월대비 ' + Math.abs(deltaPct) + '%' : '전월 데이터 없음'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">발주 횟수</div>
          <div class="stat-value">${thisOrders}<small style="font-size:12px;color:var(--ink-soft)">회</small></div>
          <div class="stat-sub">이번 달 누적</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">평균 박스/회</div>
          <div class="stat-value">${avgBoxes}<small style="font-size:12px;color:var(--ink-soft)">박스</small></div>
          <div class="stat-sub">${thisBoxes}박스 / ${thisOrders}회</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">미입금</div>
          <div class="stat-value">${unpaid > 0 ? (unpaid/10000).toFixed(0) + '<small style="font-size:12px;color:var(--ink-soft)">만</small>' : '0<small style="font-size:12px;color:var(--ink-soft)">원</small>'}</div>
          <div class="stat-sub ${unpaid > 0 ? 'down' : ''}">${unpaid > 0 ? '입금 필요' : '정상'}</div>
        </div>
      </div>
      <div class="credit-card" style="margin-top:8px">
        <div class="credit-header">
          <span class="credit-title">베스트 발주 품목 TOP 5</span>
          <span class="credit-status ok">${(now.getMonth()+1)}월 기준</span>
        </div>
        ${rankingHtml}
      </div>
    `;
  } catch (e) {
    console.error(e);
    container.innerHTML = '<div class="empty-state">구매 현황을 불러오지 못했습니다.</div>';
  }
}

function openConfirmModal() {
  const v = currentUser;
  const items = Object.keys(cart);
  if (items.length === 0) return;
  const html = items.map(id => {
    const p = getProduct(id);
    if (!p) return '';
    const price = getProductPrice(id, v.prices);
    const sub = price * cart[id];
    return `<div class="modal-summary-row"><span>${p.name} ${p.weight} × ${cart[id]}박스</span><span>${sub.toLocaleString()}원</span></div>`;
  }).join('');
  $('orderSummary').innerHTML = html;
  const total = items.reduce((s, id) => {
    return s + getProductPrice(id, v.prices) * cart[id];
  }, 0);
  $('confirmTotal').textContent = total.toLocaleString() + '원';
  $('confirmDate').textContent = ($('shipDate').value || '2026-05-14').replace(/-/g, '.');
  $('confirmModal').classList.add('show');
}

async function submitOrder() {
  const v = currentUser;
  const items = Object.keys(cart);
  if (items.length === 0) return;

  const shipDate = $('shipDate').value;
  if (!shipDate) {
    alert('출고 희망일을 선택해주세요.');
    return;
  }
  if (isWeekend(shipDate)) {
    alert('토요일/일요일은 출고 불가입니다. 출고 희망일을 평일로 변경해주세요.');
    return;
  }

  const memo = $('orderMemo') ? $('orderMemo').value.trim() : '';
  const orderNum = generateOrderNumber();
  const totalAmount = items.reduce((s, id) => s + getProductPrice(id, v.prices) * cart[id], 0);
  const totalBoxes = items.reduce((s, id) => s + cart[id], 0);

  const confirmBtn = document.querySelector('#confirmModal .btn-primary');
  if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = '저장 중...'; }

  try {
    const { data: orderRow, error: oErr } = await sb
      .from('orders')
      .insert({
        order_number: orderNum,
        vendor_id: v.id,
        ship_date: shipDate,
        total_amount: totalAmount,
        total_boxes: totalBoxes,
        payment_status: 'pending',
        memo: memo || null,
        status: 'preparing',
        confirmed: false,
        cancelled: false
      })
      .select()
      .single();

    if (oErr) {
      console.error('Order insert error:', oErr);
      alert('발주 저장 중 오류가 발생했습니다.\n' + (oErr.message || ''));
      return;
    }

    const itemsPayload = items.map(id => ({
      order_id: orderRow.id,
      product_id: id,
      quantity: cart[id],
      unit_price: getProductPrice(id, v.prices),
      subtotal: getProductPrice(id, v.prices) * cart[id]
    }));

    const { error: iErr } = await sb.from('order_items').insert(itemsPayload);

    if (iErr) {
      console.error('Order items insert error:', iErr);
      alert('발주 상세 저장 중 오류가 발생했습니다. 유통팀에 연락해주세요.\n발주번호: ' + orderNum);
      return;
    }

    closeModal('confirmModal');
    $('orderNumber').textContent = orderNum;
    setTimeout(() => $('successModal').classList.add('show'), 200);
  } catch (e) {
    console.error(e);
    alert('발주 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  } finally {
    if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = '발주 확정'; }
  }
}

function resetCart() {
  Object.keys(cart).forEach(id => {
    delete cart[id];
    const input = $('qty-' + id);
    if (input) input.value = 0;
    const card = $('card-' + id);
    if (card) card.classList.remove('in-cart');
  });
  const memo = $('orderMemo');
  if (memo) memo.value = '';
  updateCartBar();
  showToast('발주가 정상 접수되었습니다');
}

function startCountdown() {
  const el = $('countdown');
  if (!el) return;
  function tick() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(23, 59, 59, 999);
    let totalSeconds = Math.floor((midnight - now) / 1000);
    if (totalSeconds <= 0) { el.textContent = '마감'; return; }
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;
    el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} 남음`;
  }
  tick();
  setInterval(tick, 1000);
}

function switchAdminTab(ev, name) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  ev.currentTarget.classList.add('active');
  document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
  $('admin-' + name).classList.add('active');
  adminCurrentTab = name;

  if (name === 'signups') loadAdminSignups();
  else if (name === 'reports') loadAdminReports();
  else if (name === 'vendors' && !adminCurrentVendor) loadAdminVendors();
  else if (name === 'finance') loadAdminFinance();
}

async function loadAdminDashboard() {
  try {
    const today = new Date();
    const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate()).toISOString();
    const yesterdayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 1).toISOString();
    const weekAgo = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 7).toISOString();

    const { data: todayOrders, error: oErr } = await sb
      .from('orders')
      .select(`
        id, order_number, ship_date, total_amount, total_boxes,
        payment_status, status, memo, created_at,
        confirmed, confirmed_at, cancelled, cancel_reason,
        vendors ( id, name, region )
      `)
      .gte('created_at', todayStart)
      .order('created_at', { ascending: false });

    if (oErr) {
      console.error('Today orders error:', oErr);
      $('adminDashboardStats').innerHTML = '<div class="empty-state">데이터 로딩 실패: ' + (oErr.message || '') + '</div>';
      return;
    }

    const orders = todayOrders || [];
    const activeOrders = orders.filter(o => !o.cancelled); // 취소 제외
    const totalOrders = activeOrders.length;
    const totalAmount = activeOrders.reduce((s, o) => s + (o.total_amount || 0), 0);
    const pendingConfirm = activeOrders.filter(o => !o.confirmed).length;
    const pendingPayment = activeOrders.filter(o => o.payment_status === 'pending').length;
    const overdueCount = activeOrders.filter(o => o.payment_status === 'overdue').length;

    // 권한 분기
    const canConfirmEdit = currentUser.role === 'master' || currentUser.role === 'staff';

    $('adminDashboardStats').innerHTML = `
      <div class="admin-stats">
        <div class="admin-stat">
          <div class="admin-stat-label">오늘 발주 건수</div>
          <div class="admin-stat-value">${totalOrders}<span style="font-size:14px;color:var(--ink-soft)">건</span></div>
          <div class="admin-stat-sub">${orders.length > activeOrders.length ? '취소 ' + (orders.length - activeOrders.length) + '건 별도' : '실시간 누적'}</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat-label">확인 대기</div>
          <div class="admin-stat-value ${pendingConfirm > 0 ? 'urgent' : ''}">${pendingConfirm}<span style="font-size:14px;color:var(--ink-soft)">건</span></div>
          <div class="admin-stat-sub">${pendingConfirm > 0 ? '확인 필요' : '모두 확인됨'}</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat-label">오늘 발주 금액</div>
          <div class="admin-stat-value">${(totalAmount/10000).toFixed(0)}<span style="font-size:14px;color:var(--ink-soft)">만원</span></div>

        </div>
        <div class="admin-stat">
          <div class="admin-stat-label">입금 대기 · 연체</div>
          <div class="admin-stat-value ${(pendingPayment + overdueCount) > 0 ? 'urgent' : ''}">${pendingPayment}<span style="font-size:14px;color:var(--ink-soft)">·${overdueCount}건</span></div>

    const { data: recentOrders, error: rErr } = await sb
      .from('orders')
      .select('vendor_id, created_at')
      .gte('created_at', weekAgo);

    if (!vErr && !rErr && vendorsRecent) {
      const activeVendorIds = new Set((recentOrders || []).map(o => o.vendor_id));
      const inactive = vendorsRecent.filter(v => !activeVendorIds.has(v.id));
      $('inactiveVendorCount').textContent = inactive.length + '곳';
      if (inactive.length === 0) {
        $('adminInactiveVendors').innerHTML = '<div class="empty-state">최근 7일 모든 활성 거래처가 발주했습니다</div>';
      } else {
        $('adminInactiveVendors').innerHTML = `
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>거래처</th>
                  <th>지역</th>
                  <th>연락처</th>
                  <th class="center">상태</th>
                </tr>
              </thead>
              <tbody>
                ${inactive.map(v => `
                  <tr>
                    <td><b>${v.name}</b></td>
                    <td>${v.region || '-'}</td>
                    <td>${v.phone || '-'}</td>
                    <td class="center"><span class="badge orange">발주 없음</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }
    } else {
      $('adminInactiveVendors').innerHTML = '<div class="empty-state">데이터 로딩 실패</div>';
    }

  } catch (e) {
    console.error(e);
    $('adminDashboardStats').innerHTML = '<div class="empty-state">불러오기 실패</div>';
  }
}

function renderPaymentStatus(s) {
  if (s === 'paid') return '<span class="badge green">입금 완료</span>';
  if (s === 'pending') return '<span class="badge blue">입금 대기</span>';
  if (s === 'overdue') return '<span class="badge red">연체</span>';
  return '<span class="badge gray">' + (s || '-') + '</span>';
}

// ============ 발주 확인 (관리자) ============
async function confirmOrder(orderId, ev, fromModal) {
  if (!confirm('이 발주를 확인 처리하시겠습니까?\n\n확인 후에는 거래처가 직접 취소할 수 없습니다.')) return;

  const btn = ev && ev.target ? ev.target : null;
  if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; }

  try {
    const { data: o } = await sb
      .from('orders')
      .select('confirmed, cancelled')
      .eq('id', orderId)
      .single();
    if (o?.cancelled) {
      alert('취소된 발주는 확인할 수 없습니다.');
      return;
    }
    if (o?.confirmed) {
      alert('이미 확인된 발주입니다.');
      return;
    }

    const { error } = await sb
      .from('orders')
      .update({
        confirmed: true,
        confirmed_at: new Date().toISOString(),
        confirmed_by: currentUser.name || currentUser.role
      })
      .eq('id', orderId);

    if (error) {
      console.error(error);
      alert('확인 처리 실패: ' + (error.message || ''));
      return;
    }

    await sb.from('order_history').insert({
      order_id: orderId,
      action_type: 'confirm',
      action_by: currentUser.name || currentUser.email,
      action_role: currentUser.role,
      reason: null,
      changes: { confirmed: { from: false, to: true } }
    });

    showToast('발주 확인 완료');
    if (fromModal) closeOrderDetailModal();
    loadAdminDashboard();
  } catch (e) {
    console.error(e);
    alert('확인 처리 중 오류 발생');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '확인'; }
  }
}

async function confirmAdminCancel(orderId) {
  const reason = $('ac_reason').value.trim();
  if (!reason) {
    alert('취소 사유를 반드시 입력해주세요.');
    return;
  }

  const btn = document.querySelector('#adminCancelModal .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; }

  try {
    const { data: order } = await sb
      .from('orders')
      .select('id, total_amount, vendor_id, cancelled')
      .eq('id', orderId)
      .single();
    if (!order || order.cancelled) {
      alert('이미 처리된 발주입니다.');
      return;
    }

    const { error } = await sb
      .from('orders')
      .update({
        cancelled: true,
        cancelled_at: new Date().toISOString(),
        cancel_reason: reason,
        cancelled_by: currentUser.name || currentUser.role
      })
      .eq('id', orderId);

    if (error) {
      console.error(error);
      alert('취소 처리 실패: ' + (error.message || ''));
      return;
    }

    const { data: v } = await sb
      .from('vendors')
      .select('credit_used')
      .eq('id', order.vendor_id)
      .single();
    if (v) {
      const newUsed = Math.max(0, (v.credit_used || 0) - (order.total_amount || 0));
      await sb.from('vendors').update({ credit_used: newUsed }).eq('id', order.vendor_id);
    }

    await sb.from('order_history').insert({
      order_id: orderId,
      action_type: 'cancel',
      action_by: currentUser.name || currentUser.email,
      action_role: currentUser.role,
      reason: reason,
      changes: { cancelled: { from: false, to: true } }
    });

    closeAdminCancelModal();
    closeOrderDetailModal();
    showToast('발주 취소 처리 완료');
    loadAdminDashboard();
  } catch (e) {
    console.error(e);
    alert('취소 처리 중 오류 발생');
  }
}

function recalcEditTotal() {
  const rows = document.querySelectorAll('#editItemsTable tbody tr');
  let totalBoxes = 0;
  let totalAmount = 0;
  rows.forEach(row => {
    const qtyInput = row.querySelector('.edit-qty');
    const qty = parseInt(qtyInput.value) || 0;
    const unitPrice = parseInt(row.dataset.unitPrice) || 0;
    const subtotal = qty * unitPrice;
    row.querySelector('.edit-subtotal').innerHTML = '<b>' + subtotal.toLocaleString() + '원</b>';
    totalBoxes += qty;
    totalAmount += subtotal;
  });
  $('oe_total_boxes').textContent = totalBoxes + '박스';
  $('oe_total_amount').textContent = totalAmount.toLocaleString() + '원';
}

async function saveOrderEdit(orderId) {
  const reason = $('oe_reason').value.trim();
  if (!reason) {
    alert('수정 사유를 반드시 입력해주세요.');
    return;
  }

  const newShipDate = $('oe_ship_date').value;
  if (!newShipDate) {
    alert('출고희망일을 입력해주세요.');
    return;
  }
  if (isWeekend(newShipDate)) {
    alert('토/일은 출고일로 선택할 수 없습니다.');
    return;
  }

  const newMemo = $('oe_memo').value.trim();

  const rows = document.querySelectorAll('#editItemsTable tbody tr');
  const updatedItems = [];
  rows.forEach(row => {
    const itemId = row.dataset.itemId;
    const qty = parseInt(row.querySelector('.edit-qty').value) || 0;
    const unitPrice = parseInt(row.dataset.unitPrice) || 0;
    updatedItems.push({
      id: itemId,
      quantity: qty,
      subtotal: qty * unitPrice
    });
  });

  const newTotalBoxes = updatedItems.reduce((s, it) => s + it.quantity, 0);
  const newTotalAmount = updatedItems.reduce((s, it) => s + it.subtotal, 0);

  if (newTotalBoxes === 0) {
    alert('전체 수량이 0입니다. 취소 처리하시려면 [발주 취소] 버튼을 사용하세요.');
    return;
  }

  const orig = window._editingOrder;
  const changes = {};

  const origItemsMap = {};
  (orig.order_items || []).forEach(it => { origItemsMap[it.id] = it; });
  const itemChanges = [];
  updatedItems.forEach(ui => {
    const o = origItemsMap[ui.id];
    if (o && o.quantity !== ui.quantity) {
      itemChanges.push(`${o.products?.name || '품목'}: ${o.quantity}박스 → ${ui.quantity}박스`);
    }
  });

  if (itemChanges.length > 0) changes.items = itemChanges;
  if (orig.ship_date !== newShipDate) changes.ship_date = { from: orig.ship_date, to: newShipDate };
  if ((orig.memo || '') !== newMemo) changes.memo = { from: orig.memo || '', to: newMemo };
  if (orig.total_amount !== newTotalAmount) changes.total_amount = { from: orig.total_amount, to: newTotalAmount };
  if (orig.total_boxes !== newTotalBoxes) changes.total_boxes = { from: orig.total_boxes, to: newTotalBoxes };

  if (Object.keys(changes).length === 0) {
    alert('변경된 내용이 없습니다.');
    return;
  }

  const btn = document.querySelector('#orderEditModal .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

  try {
    for (const ui of updatedItems) {
      if (ui.quantity === 0) {
        await sb.from('order_items').delete().eq('id', ui.id);
      } else {
        await sb.from('order_items').update({
          quantity: ui.quantity,
          subtotal: ui.subtotal
        }).eq('id', ui.id);
      }
    }

    const { error: uErr } = await sb
      .from('orders')
      .update({
        ship_date: newShipDate,
        memo: newMemo || null,
        total_amount: newTotalAmount,
        total_boxes: newTotalBoxes
      })
      .eq('id', orderId);

    if (uErr) {
      console.error(uErr);
      alert('저장 실패: ' + (uErr.message || ''));
      return;
    }

    const diff = newTotalAmount - orig.total_amount;
    if (diff !== 0) {
      const { data: v } = await sb
        .from('vendors')
        .select('credit_used')
        .eq('id', orig.vendor_id)
        .single();
      if (v) {
        const newUsed = Math.max(0, (v.credit_used || 0) + diff);
        await sb.from('vendors').update({ credit_used: newUsed }).eq('id', orig.vendor_id);
      }
    }

    await sb.from('order_history').insert({
      order_id: orderId,
      action_type: 'edit',
      action_by: currentUser.name || currentUser.email,
      action_role: currentUser.role,
      reason: reason,
      changes: changes
    });

    closeOrderEditModal();
    closeOrderDetailModal();
    showToast('수정 완료');
    loadAdminDashboard();
  } catch (e) {
    console.error(e);
    alert('저장 중 오류 발생');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '저장'; }
  }
}

async function loadAdminVendors() {
  try {
    const { data: vendors, error } = await sb
      .from('vendors')
      .select('id, vendor_id, name, region, phone, credit_limit, credit_used, active, created_at')
      .order('created_at', { ascending: false });

    if (error) {
      console.error('Vendors load error:', error);
      $('vendorGridContainer').innerHTML = '<div class="empty-state">불러오기 실패: ' + (error.message || '') + '</div>';
      return;
    }

    LIVE_VENDORS = vendors || [];
    const totalCount = LIVE_VENDORS.length;
    const activeCount = LIVE_VENDORS.filter(v => v.active).length;
    $('vendorCountSub').textContent = `총 ${totalCount}곳 · 활성 ${activeCount}곳`;

    if (totalCount === 0) {
      $('vendorGridContainer').innerHTML = '<div class="empty-state">등록된 거래처가 없습니다</div>';
      return;
    }

    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
    const { data: monthlyOrders } = await sb
      .from('orders')
      .select('vendor_id, total_amount')
      .eq('cancelled', false)
      .gte('created_at', monthStart);

    const monthlyByVendor = {};
    for (const o of (monthlyOrders || [])) {
      if (!monthlyByVendor[o.vendor_id]) {
        monthlyByVendor[o.vendor_id] = { amount: 0, count: 0 };
      }
      monthlyByVendor[o.vendor_id].amount += (o.total_amount || 0);
      monthlyByVendor[o.vendor_id].count += 1;
    }

    $('vendorGridContainer').innerHTML = `
      <div class="vendor-grid">
        ${LIVE_VENDORS.map(v => {
          const pct = v.credit_limit > 0 ? (v.credit_used / v.credit_limit) * 100 : 0;
          const warning = pct >= 70;
          const monthly = monthlyByVendor[v.id] || { amount: 0, count: 0 };
          return `
            <div class="vendor-card" onclick="openVendorDetail('${v.id}')">
              <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:8px;">
                <div>
                  <div class="vendor-name">${v.name}</div>
                  <div class="vendor-id">${v.vendor_id} · ${v.region || '-'}</div>
                </div>
                ${v.active 
                  ? '<span class="badge green">활성</span>' 
                  : '<span class="badge gray">비활성</span>'}
              </div>
              <div style="margin-bottom:12px;">
                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;">
                  <span style="color:var(--ink-soft)">여신 사용률</span>
                  <span style="font-weight:600; color:${warning ? 'var(--orange)' : 'var(--green)'}">${pct.toFixed(0)}%</span>
                </div>
                <div class="credit-bar"><div class="credit-bar-fill ${warning ? 'warning' : ''}" style="width:${pct}%"></div></div>
              </div>
              <div class="vendor-meta">
                <div>
                  <div class="vendor-meta-label">이번 달 매출</div>
                  <div class="vendor-meta-value">${(monthly.amount/10000).toFixed(0)}만</div>
                </div>
                <div>
                  <div class="vendor-meta-label">발주 횟수</div>
                  <div class="vendor-meta-value">${monthly.count}회</div>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  } catch (e) {
    console.error(e);
    $('vendorGridContainer').innerHTML = '<div class="empty-state">불러오기 실패</div>';
  }
}

async function loadVendorDetail(vendorId) {
  try {
    const { data: vendor, error: vErr } = await sb
      .from('vendors')
      .select('*')
      .eq('id', vendorId)
      .single();

    if (vErr || !vendor) {
      $('vendorDetailContent').innerHTML = '<div class="empty-state">거래처를 찾을 수 없습니다</div>';
      return;
    }
    LIVE_VENDOR_DETAIL = vendor;

    const { data: products } = await sb
      .from('products')
      .select('id, code, category, name, weight, spec, base_price, active')
      .order('code');

    const { data: prices } = await sb
      .from('vendor_prices')
      .select('id, product_id, custom_price')
      .eq('vendor_id', vendorId);

    LIVE_VENDOR_PRICES = {};

      .from('orders')
      .select('total_amount, payment_status')
      .eq('vendor_id', vendorId)
      .eq('cancelled', false)
      .gte('created_at', monthStart);

      .from('orders')

      .lt('created_at', monthStart);

    const monthlyOrders = (thisMonthOrders || []).length;
    const prevAmount = (prevMonthOrders || []).reduce((s, o) => s + (o.total_amount || 0), 0);
    const unpaidAmount = (thisMonthOrders || [])
      .filter(o => o.payment_status === 'pending' || o.payment_status === 'overdue')

function markPriceChange(productId, newValue, basePrice) {
  const current = LIVE_VENDOR_PRICES[productId] !== undefined ? LIVE_VENDOR_PRICES[productId] : basePrice;
  const newPrice = parseInt(newValue) || 0;
  const input = $('price-' + productId);
  const diff = newPrice - current;

  if (diff !== 0) {
    priceChanges[productId] = newPrice;
    input.classList.add('changed');
  } else {
    delete priceChanges[productId];
    input.classList.remove('changed');
  }

  const totalDiff = newPrice - basePrice;
  const totalDiffPct = ((totalDiff / basePrice) * 100).toFixed(1);
  const diffEl = $('diff-' + productId);
  if (diffEl) {
    diffEl.style.color = totalDiff > 0 ? 'var(--green)' : totalDiff < 0 ? 'var(--red)' : 'var(--ink-soft)';
    diffEl.textContent = totalDiff === 0 ? '-' : (totalDiff > 0 ? '+' : '') + totalDiff.toLocaleString() + '원 (' + (totalDiff > 0 ? '+' : '') + totalDiffPct + '%)';
  }

  const count = Object.keys(priceChanges).length;
  $('changeCount').textContent = count;
  $('saveBanner').classList.toggle('show', count > 0);
}

function resetPriceChanges() {
  Object.keys(priceChanges).forEach(pid => {
    const input = $('price-' + pid);
    if (input) {
      const original = LIVE_VENDOR_PRICES[pid];
      input.value = original;
      input.classList.remove('changed');
      // diff 재계산은 markPriceChange를 한 번 더 호출하면 자동 정리됨
    }
  });
  priceChanges = {};
  $('saveBanner').classList.remove('show');
  if (adminCurrentVendor) renderVendorDetail(adminCurrentVendor);
}

async function savePriceChanges(vendorId) {
  const changes = Object.keys(priceChanges);
  if (changes.length === 0) return;

  const btn = document.querySelector('.save-banner .btn-sm[style*="yellow"]');
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

  try {
    const upserts = changes.map(productId => {
      const row = {
        vendor_id: vendorId,
        product_id: productId,
        custom_price: priceChanges[productId]
      };
      if (LIVE_VENDOR_PRICE_ROW_IDS[productId]) {
        row.id = LIVE_VENDOR_PRICE_ROW_IDS[productId];
      }
      return row;
    });

    const { error } = await sb
      .from('vendor_prices')
      .upsert(upserts, { onConflict: 'vendor_id,product_id' });

    if (error) {
      console.error('Price save error:', error);
      alert('단가 저장 중 오류가 발생했습니다.\n' + (error.message || ''));
      return;
    }

    const count = changes.length;
    priceChanges = {};
    showToast(`단가 ${count}건 저장 완료 · 거래처 발주 화면에 즉시 반영됩니다`);
    renderVendorDetail(vendorId);
  } catch (e) {
    console.error(e);
    alert('단가 저장 중 오류 발생');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '저장'; }
  }
}

async function toggleVendorActive(vendorId, currentActive) {
  const newActive = !currentActive;
  const action = newActive ? '활성화' : '비활성화';
  if (!confirm(`이 거래처를 ${action}하시겠습니까?\n${!newActive ? '\n비활성화되면 해당 거래처는 로그인할 수 없습니다.' : ''}`)) return;

  try {
    const { error } = await sb
      .from('vendors')
      .update({ active: newActive })
      .eq('id', vendorId);

    if (error) {
      console.error('Toggle active error:', error);
      alert('상태 변경 중 오류가 발생했습니다.\n' + (error.message || ''));
      return;
    }

    showToast(`${action} 완료`);
    renderVendorDetail(vendorId);
  } catch (e) {
    console.error(e);
    alert('상태 변경 실패');
  }
}

async function approveSignup(id) {
  try {
    const { data: r, error: fetchErr } = await sb
      .from('signup_requests')
      .select('*')
      .eq('id', id)
      .single();
    if (fetchErr || !r) {
      alert('신청서를 찾을 수 없습니다.');
      return;
    }

    if (!r.preferred_id || !r.preferred_password) {
      alert('신청서에 ID 또는 비밀번호 정보가 없습니다.');
      return;
    }

    const msg =
      `[${r.store_name}] 신청을 승인하시겠습니까?\n\n` +
      `━━━━━━━━━━━━━━━━━━\n` +
      `상호명: ${r.store_name}\n` +
      `대표자: ${r.owner_name}\n` +
      `연락처: ${r.phone}\n` +
      `로그인 ID: ${r.preferred_id}\n` +
      `━━━━━━━━━━━━━━━━━━\n\n` +
      `승인 시 다음이 자동으로 처리됩니다:\n` +
      `  ✓ Supabase Auth 계정 생성\n` +
      `  ✓ 거래처 정보 등록\n` +
      `  ✓ 9개 품목 단가 자동 입력 (기본가)\n\n` +
      `여신 한도는 [거래처 관리] 화면에서 별도 설정해주세요.`;

    if (!confirm(msg)) return;

    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      alert('인증 세션이 만료되었습니다. 다시 로그인해주세요.');
      return;
    }

    const btn = event && event.target ? event.target : null;
    if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; }

    const res = await fetch(`${SUPABASE_URL}/functions/v1/create-vendor`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ request_id: id })
    });

    const result = await res.json();

    if (!res.ok || !result.success) {
      console.error('Create vendor error:', result);
      alert('거래처 등록 실패:\n' + (result.error || '알 수 없는 오류'));
      if (btn) { btn.disabled = false; btn.textContent = '승인'; }
      return;
    }

    alert(
      `✓ 거래처 등록 완료!\n\n` +
      `상호명: ${result.vendor_name}\n` +
      `로그인 ID: ${result.login_id}\n` +
      `비밀번호: (신청자가 입력하신 비밀번호 그대로)\n\n` +
      `거래처에 "신청하신 ID/PW로 바로 로그인 가능합니다"라고 안내해주세요.\n` +
      `(보안을 위해 첫 로그인 후 비밀번호 변경 권장)\n\n` +
      `여신 한도는 거래처 관리 화면에서 설정해주세요.`
    );

    loadAdminSignups();
    loadPendingSignupBadge();
  } catch (e) {
    console.error(e);
    alert('승인 처리 중 오류 발생: ' + e.message);
  }
}

async function rejectSignup(id) {
  const reason = prompt('반려 사유를 입력하세요 (선택, 빈 칸이면 그냥 반려):');
  if (reason === null) return;

  try {
    const { error } = await sb
      .from('signup_requests')
      .update({
        status: 'rejected',
        memo: reason ? '[반려 사유] ' + reason : null,
        preferred_password: null
      })
      .eq('id', id);

    if (error) {
      console.error('Reject error:', error);
      alert('반려 처리 중 오류 발생: ' + (error.message || ''));
      return;
    }

    showToast('반려 처리 완료');
    loadAdminSignups();
    loadPendingSignupBadge();
  } catch (e) {
    console.error(e);
    alert('반려 처리 실패');
  }
}
